<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Arcade | Next-Gen Cyber Hub</title>
    <style>
        :root {
            --primary: #ff007f;
            --secondary: #7f00ff;
            --bg: #050508;
            --card: #0e0e16;
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* جزيئات النيون المتحركة في الخلفية */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* الهيدر ورسالة الترحيب الذكية */
        header {
            padding: 50px 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(255, 0, 127, 0.1), transparent);
            border-bottom: 1px solid rgba(255, 0, 127, 0.2);
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px var(--primary);
        }

        .welcome-msg {
            font-size: 1.2rem;
            color: #00ffff;
            margin-top: 15px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
