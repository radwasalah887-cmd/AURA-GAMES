<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Arcade | Next-Gen HTML5 Gaming Hub</title>
    <style>
        :root {
            --primary-glow: #ff007f;
            --secondary-glow: #7f00ff;
            --dark-bg: #09090e;
            --card-bg: #13131c;
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* رأس الصفحة الهيدر */
        header {
            background: linear-gradient(180px, rgba(255, 0, 127, 0.1), transparent);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 0, 127, 0.2);
        }

        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .subtitle {
            color: #a0a0b0;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        /* شبكة الألعاب الذكية والمدمجة */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            color: #ffffff;
            font-size: 1.5rem;
            margin-bottom: 25px;
            text-align: right;
            border-right: 4px solid var(--primary-glow);
            padding-right: 15px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        /* بطاقات ألعاب نيون متحركة ومدمجة */
        .game-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        /* حركة النيون والتوهج المدمج بالخلفية عند التحويم */
        .game-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary-glow);
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.4), 0 0 40px rgba(127, 0, 255, 0.2);
        }

        .game-card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }

        .game-card:hover img {
            transform: scale(1.03);
        }

        .game-title {
            font-size: 0.9rem;
            margin-top: 12px;
            font-weight: 600;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #e0e0e0;
            transition: color 0.3s ease;
        }

        .game-card:hover .game-title {
            color: var(--primary-glow);
        }

        /* حاوية نافذة اللعبة المنبثقة الاحترافية */
        .game-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 8, 0.95);
            z-index: 99999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            width: 90%;
            height: 80%;
            max-width: 960px;
            background: #000;
            border: 2px solid var(--primary-glow);
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.5);
            overflow: hidden;
            position: relative;
        }
.game-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-button {
            background: linear-gradient(90deg, var(--primary-glow), var(--secondary-glow));
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            margin-bottom: 20px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            transition: transform 0.2s;
        }

        .close-button:hover {
            transform: scale(1.05);
        }

        /* تأثير تحميل أنيق */
        .loading-text {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #a0a0b0;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>VORTEX ARCADE</h1>
        <div class="subtitle">بوابتك الرقمية لأحدث وأقوى ألعاب الـ HTML5 التلقائية</div>
    </header>

    <div class="container">
        <div class="section-title">اكتشف عوالم الألعاب الحماسية (500 لعبة محدثة)</div>
        
        <!-- شبكة الألعاب التي تسحب تلقائياً -->
        <div class="games-grid" id="gamesGrid">
            <div class="loading-text">جاري الاتصال بالسيرفر وجلب الألعاب الحماسية الآمنة...</div>
        </div>
    </div>

    <!-- شاشة تشغيل الألعاب المرنة -->
    <div class="game-modal" id="gameModal">
        <button class="close-button" onclick="closeGameZone()">إغلاق اللعبة والعودة للموقع ✕</button>
        <div class="modal-content">
            <iframe class="game-frame" id="gameFrame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // رابط تغذية الألعاب الرسمي والتلقائي الآمن لـ GameMonetize
        const gameFeedUrl = "https://gamemonetize.com";

        async function initArcadeFeed() {
            try {
                const res = await fetch(gameFeedUrl);
                const gamesList = await res.json();
                const gridContainer = document.getElementById('gamesGrid');
                gridContainer.innerHTML = ''; // تنظيف نص التحميل

                gamesList.forEach(game => {
                    // بناء كارت العرض لكل لعبة بشكل آمن ومحمي
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.onclick = () => launchGameZone(game.url);

                    card.innerHTML = 
                        <img src="${game.thumb}" alt="${game.title}" loading="lazy">
                        <div class="game-title">${game.title}</div>
                    ;
                    gridContainer.appendChild(card);
                });
            } catch (err) {
                document.getElementById('gamesGrid').innerHTML = '<div class="loading-text" style="color: #ff007f;">فشل تحميل الألعاب تلقائياً، يرجى إعادة تحديث الصفحة للاتصال بالخادم.</div>';
            }
        }

        function launchGameZone(url) {
            document.getElementById('gameFrame').src = url;
            document.getElementById('gameModal').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // قفل التمرير خلف اللعبة
        }

        function closeGameZone() {
            document.getElementById('gameModal').style.display = 'none';
            document.getElementById('gameFrame').src = ''; // تصفير الـ iframe لمنع بقاء صوت اللعبة بالخلفية
            document.body.style.overflow = 'auto'; // إعادة التمرير للموقع
        }

        // إطلاق دالة الجلب عند تحميل الصفحة
        initArcadeFeed();
    </script>
</body>
</html>
